<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sweetheart Bakery</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf6ee;
    --warm-white: #fff9f2;
    --brown-deep: #3b2314;
    --brown-mid: #7a4528;
    --brown-light: #c8845a;
    --caramel: #e0a96d;
    --caramel-light: #f0c89a;
    --dusty-rose: #d4907a;
    --sage: #8a9e7e;
    --text-dark: #2c1a0e;
    --text-mid: #6b4226;
    --shadow: rgba(59,35,20,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--cream);
    font-family: 'Lato', sans-serif;
    color: var(--text-dark);
    min-height: 100vh;
  }

  header {
    background: var(--brown-deep);
    padding: 28px 20px 22px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 60% 0%, #7a4528 0%, transparent 65%),
                radial-gradient(ellipse at 20% 100%, #5a2e10 0%, transparent 60%);
  }
  header::after {
    content: '✦ ✦ ✦';
    display: block;
    color: var(--caramel);
    opacity: 0.4;
    font-size: 10px;
    letter-spacing: 8px;
    margin-top: 6px;
    position: relative;
  }
  .header-inner { position: relative; }
  .bakery-tag {
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--caramel);
    opacity: 0.8;
    margin-bottom: 6px;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 8vw, 42px);
    color: var(--warm-white);
    font-weight: 600;
    line-height: 1.1;
  }
  header h1 em {
    font-style: italic;
    color: var(--caramel-light);
  }
  .header-sub {
    font-size: 12px;
    color: var(--caramel-light);
    opacity: 0.7;
    margin-top: 8px;
    letter-spacing: 1px;
  }

  .cart-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--brown-mid);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    box-shadow: 0 2px 12px var(--shadow);
    transition: all 0.3s;
  }
  .cart-bar.hidden { transform: translateY(-100%); opacity: 0; pointer-events: none; }
  .cart-summary {
    font-size: 13px;
    color: var(--caramel-light);
    font-weight: 400;
  }
  .cart-summary strong {
    font-size: 15px;
    color: #fff;
    font-weight: 700;
  }
  .order-btn {
    background: var(--caramel);
    color: var(--brown-deep);
    border: none;
    padding: 9px 20px;
    border-radius: 50px;
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .order-btn:active { transform: scale(0.97); }
  .order-btn:hover { background: var(--caramel-light); }
  .order-btn .wa-icon { font-size: 15px; }

  .section-label {
    padding: 24px 18px 10px;
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--brown-deep);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--caramel-light);
    opacity: 0.6;
  }

  .menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    padding: 0 14px 14px;
  }
  @media (min-width: 480px) {
    .menu-grid { grid-template-columns: repeat(3, 1fr); }
  }

  .item-card {
    background: var(--warm-white);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 10px var(--shadow);
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
    position: relative;
    border: 2px solid transparent;
  }
  .item-card:active { transform: scale(0.97); }
  .item-card.selected {
    border-color: var(--brown-mid);
    box-shadow: 0 4px 18px rgba(122,69,40,0.22);
  }
  .item-card.selected::after {
    content: '✓';
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--brown-mid);
    color: white;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }
  .item-emoji {
    font-size: 38px;
    text-align: center;
    padding: 18px 10px 8px;
    background: linear-gradient(180deg, #f5e9d8 0%, var(--warm-white) 100%);
    display: block;
  }
  .item-info { padding: 10px 12px 12px; }
  .item-name {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--brown-deep);
    margin-bottom: 3px;
    line-height: 1.3;
  }
  .item-desc {
    font-size: 10px;
    color: var(--text-mid);
    opacity: 0.8;
    margin-bottom: 8px;
    line-height: 1.4;
  }
  .item-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .item-price {
    font-weight: 700;
    font-size: 14px;
    color: var(--brown-mid);
  }

  .qty-controls {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--cream);
    border-radius: 20px;
    padding: 3px 6px;
  }
  .qty-btn {
    background: var(--brown-mid);
    color: white;
    border: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .qty-btn:hover { background: var(--brown-deep); }
  .qty-num {
    font-size: 13px;
    font-weight: 700;
    color: var(--brown-deep);
    min-width: 14px;
    text-align: center;
  }
  .add-btn {
    background: var(--caramel);
    color: var(--brown-deep);
    border: none;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
  }
  .add-btn:hover { background: var(--caramel-light); }

  .cart-panel {
    margin: 8px 14px 0;
    background: var(--warm-white);
    border-radius: 18px;
    padding: 18px;
    box-shadow: 0 2px 14px var(--shadow);
    border: 1px solid var(--caramel-light);
    display: none;
  }
  .cart-panel.visible { display: block; }
  .cart-panel-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    color: var(--brown-deep);
    margin-bottom: 14px;
    font-weight: 600;
  }
  .cart-item-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px dashed var(--caramel-light);
    font-size: 13px;
  }
  .cart-item-row:last-of-type { border-bottom: none; }
  .cart-item-name { color: var(--text-mid); }
  .cart-item-price { font-weight: 700; color: var(--brown-mid); }
  .cart-total-row {
    display: flex;
    justify-content: space-between;
    margin-top: 12px;
    padding-top: 10px;
    border-top: 2px solid var(--caramel);
    font-weight: 700;
    font-size: 15px;
    color: var(--brown-deep);
  }

  .wa-btn {
    display: block;
    width: 100%;
    margin-top: 16px;
    background: #25d366;
    color: white;
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-family: 'Lato', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: background 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .wa-btn:hover { background: #1ebe5d; }
  .wa-btn:active { transform: scale(0.98); }

  .note-area {
    width: 100%;
    margin-top: 12px;
    padding: 10px 14px;
    border: 1px solid var(--caramel-light);
    border-radius: 10px;
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    color: var(--text-dark);
    background: var(--cream);
    resize: none;
    outline: none;
  }
  .note-area:focus { border-color: var(--brown-light); }
  .note-label {
    font-size: 11px;
    color: var(--text-mid);
    margin-top: 12px;
    margin-bottom: 4px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .empty-note {
    text-align: center;
    padding: 32px 20px 40px;
    color: var(--text-mid);
    opacity: 0.6;
    font-size: 13px;
  }
  .empty-note span { font-size: 32px; display: block; margin-bottom: 8px; }

  footer {
    text-align: center;
    padding: 28px 20px;
    font-size: 11px;
    color: var(--text-mid);
    opacity: 0.5;
    letter-spacing: 1px;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--brown-deep);
    color: var(--caramel-light);
    padding: 10px 22px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 700;
    z-index: 999;
    transition: transform 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="bakery-tag">Est. 2024 &nbsp;·&nbsp; Homemade with love</div>
    <h1><em>Sweetheart</em> Bakery</h1>
    <div class="header-sub">Fresh bakes · Daily specials · Made to order</div>
  </div>
</header>

<div class="cart-bar hidden" id="cartBar">
  <div class="cart-summary">
    <span id="cartCount">0 items</span><br>
    <strong id="cartBarTotal">₹0</strong>
  </div>
  <button class="order-btn" onclick="scrollToCart()">
    <span class="wa-icon">🛒</span> View Order
  </button>
</div>

<div class="section-label">🎂 Cakes</div>
<div class="menu-grid" id="grid-cakes"></div>

<div class="section-label">🍪 Cookies & Biscuits</div>
<div class="menu-grid" id="grid-cookies"></div>

<div class="section-label">🍞 Breads & Buns</div>
<div class="menu-grid" id="grid-breads"></div>

<div class="section-label">☕ Beverages</div>
<div class="menu-grid" id="grid-beverages"></div>

<div class="section-label" id="cartSection">🧾 Your Order</div>
<div class="cart-panel" id="cartPanel">
  <div id="cartItems"></div>
  <div class="note-label">Special Instructions</div>
  <textarea class="note-area" id="noteInput" rows="2" placeholder="Any allergies, customisations, delivery address..."></textarea>
  <button class="wa-btn" onclick="sendToWhatsApp()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.126 1.532 5.859L.057 23.704a.75.75 0 0 0 .918.918l5.888-1.473A11.952 11.952 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.907 0-3.696-.511-5.234-1.402l-.374-.22-3.875.969.985-3.814-.24-.389A9.96 9.96 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
    Send Order on WhatsApp
  </button>
</div>

<div class="empty-note" id="emptyNote">
  <span>🧁</span>
  Add items above to start your order
</div>

<footer>SWEETHEART BAKERY · Orders via WhatsApp · Fresh daily</footer>

<div class="toast" id="toast"></div>

<script>
  const WHATSAPP_NUMBER = '919133458116';
  const UPI_ID = 'anushapantula@ybl';

  const MENU = {
    cakes: [
      { id: 'c1', emoji: '🎂', name: 'Chocolate Truffle', desc: 'Rich dark chocolate layers', price: 450 },
      { id: 'c2', emoji: '🍓', name: 'Strawberry Fresh Cream', desc: 'Light sponge, fresh fruit', price: 420 },
      { id: 'c3', emoji: '🥕', name: 'Carrot Walnut', desc: 'Cream cheese frosting', price: 380 },
      { id: 'c4', emoji: '🍋', name: 'Lemon Drizzle', desc: 'Zesty & moist', price: 360 },
    ],
    cookies: [
      { id: 'ck1', emoji: '🍪', name: 'Choco Chip Cookies', desc: 'Box of 6, double choco', price: 180 },
      { id: 'ck2', emoji: '🥜', name: 'Peanut Butter Cookies', desc: 'Soft baked, box of 6', price: 160 },
      { id: 'ck3', emoji: '🌙', name: 'Butter Nan Khatai', desc: 'Traditional style, 8 pcs', price: 120 },
      { id: 'ck4', emoji: '🍫', name: 'Double Choco Brownies', desc: 'Fudgy, box of 4', price: 200 },
    ],
    breads: [
      { id: 'b1', emoji: '🍞', name: 'Sourdough Loaf', desc: 'Artisan, slow fermented', price: 220 },
      { id: 'b2', emoji: '🥐', name: 'Butter Croissant', desc: 'Flaky, pack of 2', price: 140 },
      { id: 'b3', emoji: '🫓', name: 'Garlic Herb Focaccia', desc: 'Rosemary & olive oil', price: 180 },
      { id: 'b4', emoji: '🥖', name: 'Whole Wheat Bun', desc: 'Soft, pack of 4', price: 100 },
    ],
    beverages: [
      { id: 'v1', emoji: '☕', name: 'Filter Coffee', desc: 'South Indian style', price: 60 },
      { id: 'v2', emoji: '🍵', name: 'Masala Chai', desc: 'Ginger, cardamom', price: 50 },
      { id: 'v3', emoji: '🥛', name: 'Cold Coffee', desc: 'With ice cream', price: 90 },
    ],
  };

  const cart = {};

  function getItem(id) {
    for (const cat of Object.values(MENU)) {
      const found = cat.find(i => i.id === id);
      if (found) return found;
    }
  }

  function renderMenus() {
    for (const [cat, items] of Object.entries(MENU)) {
      const grid = document.getElementById('grid-' + cat);
      grid.innerHTML = items.map(item => `
        <div class="item-card" id="card-${item.id}" onclick="handleCardClick('${item.id}')">
          <span class="item-emoji">${item.emoji}</span>
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-desc">${item.desc}</div>
            <div class="item-footer">
              <span class="item-price">₹${item.price}</span>
              <button class="add-btn" id="addbtn-${item.id}" onclick="addItem(event,'${item.id}')">+ Add</button>
              <div class="qty-controls" id="qty-${item.id}" style="display:none">
                <button class="qty-btn" onclick="changeQty(event,'${item.id}',-1)">−</button>
                <span class="qty-num" id="qnum-${item.id}">1</span>
                <button class="qty-btn" onclick="changeQty(event,'${item.id}',1)">+</button>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }
  }

  function handleCardClick(id) {
    if (!cart[id]) addItem(null, id);
  }

  function addItem(e, id) {
    if (e) e.stopPropagation();
    cart[id] = 1;
    document.getElementById('addbtn-' + id).style.display = 'none';
    document.getElementById('qty-' + id).style.display = 'flex';
    document.getElementById('card-' + id).classList.add('selected');
    updateUI();
    showToast(getItem(id).name + ' added!');
  }

  function changeQty(e, id, delta) {
    e.stopPropagation();
    cart[id] = (cart[id] || 0) + delta;
    if (cart[id] <= 0) {
      delete cart[id];
      document.getElementById('addbtn-' + id).style.display = '';
      document.getElementById('qty-' + id).style.display = 'none';
      document.getElementById('card-' + id).classList.remove('selected');
    } else {
      document.getElementById('qnum-' + id).textContent = cart[id];
    }
    updateUI();
  }

  function updateUI() {
    const ids = Object.keys(cart);
    const totalQty = ids.reduce((s, id) => s + cart[id], 0);
    const totalPrice = ids.reduce((s, id) => s + cart[id] * getItem(id).price, 0);

    const cartBar = document.getElementById('cartBar');
    const cartPanel = document.getElementById('cartPanel');
    const emptyNote = document.getElementById('emptyNote');

    if (ids.length === 0) {
      cartBar.classList.add('hidden');
      cartPanel.classList.remove('visible');
      emptyNote.style.display = '';
    } else {
      cartBar.classList.remove('hidden');
      cartPanel.classList.add('visible');
      emptyNote.style.display = 'none';
      document.getElementById('cartCount').textContent = totalQty + (totalQty === 1 ? ' item' : ' items');
      document.getElementById('cartBarTotal').textContent = '₹' + totalPrice;
    }

    const cartItemsEl = document.getElementById('cartItems');
    if (ids.length > 0) {
      cartItemsEl.innerHTML = `
        ${ids.map(id => {
          const item = getItem(id);
          return `<div class="cart-item-row">
            <span class="cart-item-name">${item.emoji} ${item.name} × ${cart[id]}</span>
            <span class="cart-item-price">₹${item.price * cart[id]}</span>
          </div>`;
        }).join('')}
        <div class="cart-total-row">
          <span>Total</span>
          <span>₹${totalPrice}</span>
        </div>
      `;
    }
  }

  function scrollToCart() {
    document.getElementById('cartSection').scrollIntoView({ behavior: 'smooth' });
  }

  function sendToWhatsApp() {
    const ids = Object.keys(cart);
    if (ids.length === 0) { showToast('Please add items first!'); return; }

    const totalPrice = ids.reduce((s, id) => s + cart[id] * getItem(id).price, 0);
    const note = document.getElementById('noteInput').value.trim();

    let msg = '🧁 *New Order from Sweetheart Bakery*\n\n';
    msg += '*Items Ordered:*\n';
    ids.forEach(id => {
      const item = getItem(id);
      msg += `• ${item.name} × ${cart[id]} = ₹${item.price * cart[id]}\n`;
    });
    msg += `\n💰 *Total: ₹${totalPrice}*`;
    if (note) msg += `\n\n📝 *Note:* ${note}`;
    msg += `\n\n💳 *Pay via UPI:*\nupi://pay?pa=${UPI_ID}&am=${totalPrice}&tn=BakeryOrder`;
    msg += `\n\n_After payment, please send screenshot here_ 🙏`;

    const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
    window.open(url, '_blank');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  renderMenus();
  updateUI();
</script>
</body>
</html>
